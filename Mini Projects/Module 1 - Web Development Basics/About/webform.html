<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webform</title>
   
</head>
<body>
    <form>
        <div class="form-group">
            <label for="name">Name:</label>
            <input required minlength="2" maxlength="30" type="name" placeholder="Enter your name">
        </div>
        <br>
        <div class="form-group">
            <label for="age">Age:</label>
            <input min="18" max="100" type="number">
        </div>
        <br>
        <div class="form-group">
            <label for="email">Email:</label>
            <input required minlength="4" maxlength="15" type="email" placeholder="Enter your email">
        </div>
        <br>
        <div class="register-container">
            <button type="submit">Submit</button>
        </div>
        <br>
    
    </form>
</body>
</html>
