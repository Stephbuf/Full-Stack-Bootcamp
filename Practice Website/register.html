<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <style>
        body {
            text-align: center;
            font-family: 'Quicksand', sans-serif;
            background-image: url("PinkBackground.jpg"); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            height: 100vh; 
        }

        form {
            margin-top: 40px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.8); 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); 
            width: 400px;
        }

        .form-group {
            display: flex; 
            justify-content: flex-start; 
            align-items: center; 
            margin-bottom: 15px; 
        }

        .form-group label {
            font-size: 18px;
            width: 120px; 
            text-align: right;
            margin-right: 10px;
        }

        .form-group input, 
        .form-group select {
            width: 70%; 
            height: 40px;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding-left: 10px;
            font-size: 15px;
            background: aliceblue;
        }

        .form-group input[type="checkbox"] {
            width: auto; 
        }

        .form-group label.checkbox-label {
            margin-left: 10px;
            text-align: left;
        }

        button {
            background-color: lightcoral;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 30px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e57373;
        }

        a {
            font-size: 14px;
            text-decoration: none;
            color: blue;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form>
        <div class="form-group">
            <label for="email">Email:</label>
            <input required minlength="4" maxlength="15" type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label for="age">Age:</label>
            <input min="18" max="100" type="number" id="age" placeholder="Age">
        </div>
        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Account Type:</label>
            <input name="account-type" type="radio" id="regular" value="regular">
            <label for="regular">Regular</label>
            <input name="account-type" type="radio" id="admin" value="admin">
            <label for="admin">Admin</label>
        </div>
        <div class="register-container">
            <button type="submit">Register</button>
        </div>
        <br>
        <div>
            <a href="index.html">Already have an account? Login</a>
        </div>
    </form>
</body>
</html>
